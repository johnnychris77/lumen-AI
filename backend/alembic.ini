# Alembic configuration for LumenAI
# The DATABASE_URL is read from the environment at runtime (see alembic/env.py)
# Do NOT hardcode database credentials here.

[alembic]
# Override this at runtime: alembic -x db_url=<url> upgrade head
# Or set DATABASE_URL environment variable (preferred)
script_location = alembic

# Default for local development only — always override via DATABASE_URL env var
sqlalchemy.url = sqlite:///./lumenai.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
