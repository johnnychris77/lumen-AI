# DO NOT commit real values to this file.
# This file shows the structure of Kubernetes Secrets used by LumenAI.
# Populate real values via:
#   - External Secrets Operator (synced from AWS Secrets Manager / Vault)
#   - kubectl create secret generic lumenai-secrets --from-env-file=.env.prod
#   - CI/CD pipeline using GITHUB_TOKEN + kubectl apply
#
# All values below are BASE64-ENCODED PLACEHOLDERS only.
# Replace <base64-encoded-value> with: echo -n "your-actual-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: lumenai-secrets
  namespace: lumenai
  labels:
    app.kubernetes.io/name: lumenai
  annotations:
    # Managed by External Secrets Operator
    # external-secrets.io/source: aws-secrets-manager
    # external-secrets.io/key: /lumenai/production/
type: Opaque
data:
  DATABASE_URL: <base64-encoded-value>           # postgresql+psycopg2://user:pass@host:5432/lumenai
  SECRET_KEY: <base64-encoded-value>             # 64-char random hex string
  STRIPE_SECRET_KEY: <base64-encoded-value>      # sk_live_...
  FDA_API_KEY: <base64-encoded-value>            # FDA API key
  JWKS_URL: <base64-encoded-value>               # https://idp.lumenai.health/.well-known/jwks.json
  STORAGE_BUCKET: <base64-encoded-value>         # lumenai-prod-audit-evidence
