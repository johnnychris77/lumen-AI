apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumenai-ingress
  namespace: lumenai
  labels:
    app.kubernetes.io/name: lumenai
  annotations:
    # cert-manager: automatically provision TLS certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Security headers (supplement nginx.conf)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.lumenai.health
        - api.lumenai.health
      secretName: lumenai-tls
  rules:
    - host: app.lumenai.health
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumenai-frontend
                port:
                  number: 80
    - host: api.lumenai.health
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumenai-backend
                port:
                  number: 8000
