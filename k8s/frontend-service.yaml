apiVersion: v1
kind: Service
metadata:
  name: lumenai-frontend
  namespace: lumenai
  labels:
    app.kubernetes.io/name: lumenai
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: lumenai-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
