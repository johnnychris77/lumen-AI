# Single-origin production edge for LumenAI on Render.
#
# WHY THIS EXISTS
#   The SPA (lumen-ai-1.onrender.com) and API (lumen-ai-53u4.onrender.com) are
#   different *sites* to the browser (onrender.com is on the Public Suffix List),
#   which makes any backend-set cookie third-party and breaks httpOnly-cookie
#   auth. Serving the SPA and proxying /api from ONE nginx host puts everything
#   on a single origin, so the session cookie is first-party and CSRF collapses
#   to SameSite=Lax + a custom-header check.
#
# HOW
#   nginx serves the built SPA and reverse-proxies /api/* to the internal
#   backend. `$API_UPSTREAM` is substituted at container start from the
#   API_UPSTREAM env var (see docker/entrypoint on the frontend image), so the
#   backend URL is configuration, not baked in.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Basic hardening headers (mirror the app's SecurityHeadersMiddleware for the
  # static shell; the API sets its own on proxied responses).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  # Health endpoint for Render's health check.
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # ── Forward /api/* to the backend, PRESERVING the /api prefix ──────────────
  # The backend mounts routes under /api, so we must NOT strip it. Note the
  # trailing slash is intentionally ABSENT on proxy_pass so nginx passes the
  # full original URI (including /api) unchanged.
  location /api/ {
    proxy_pass $API_UPSTREAM;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    # Allow large multipart image uploads (inspection/baseline images).
    client_max_body_size 25m;
    proxy_read_timeout 120s;
  }

  # ── index.html — never cache so the browser always gets the latest manifest ─
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ── Hashed JS/CSS assets — immutable (hash changes on every rebuild) ────────
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── SPA routing — see frontend/nginx.conf for why $uri/ is intentionally
  #    omitted (pre-built subdirectories would otherwise shadow the router). ───
  location / {
    try_files $uri /index.html;
  }
}
