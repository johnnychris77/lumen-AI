server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── SPA routing — serve index.html for every non-file route ──────────────
  # This is the critical fix for hard-refresh white page on sub-routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── index.html — never cache so users always get the latest asset manifest ─
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ── Hashed JS/CSS/image assets — cache forever (hash changes on rebuild) ──
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── Forward /api/* to the edge proxy container ───────────────────────────
  location /api/ {
    proxy_pass http://edge/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
