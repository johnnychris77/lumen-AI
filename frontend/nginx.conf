server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── SPA routing ───────────────────────────────────────────────────────────
  # IMPORTANT: use `try_files $uri /index.html` NOT `$uri $uri/ /index.html`.
  # The dist/ folder contains real subdirectories (dashboard/, portfolio/, etc.)
  # that are static pre-built pages copied from public/. The `$uri/` check makes
  # nginx serve dist/dashboard/index.html when the browser refreshes /dashboard —
  # a pre-rendered page instead of the React SPA — producing a white page.
  # Removing `$uri/` means nginx only matches exact files; all other paths fall
  # through to index.html so the React router takes over.
  location / {
    try_files $uri /index.html;
  }

  # ── index.html — never cache so the browser always gets the latest manifest ─
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ── Hashed JS/CSS assets — cache forever (hash changes on every rebuild) ──
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── Forward /api/* to the backend ─────────────────────────────────────────
  location /api/ {
    proxy_pass http://edge/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
