services:
  db:
    image: postgres:15-alpine
    container_name: lumenai-reset-db
    environment:
      POSTGRES_DB: lumenai
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumenai"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - lumenai_reset_db:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
      args:
        BUILD_MAIN_SHA: "dev"
    container_name: lumenai-reset-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://lumen:lumen@db:5432/lumenai
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /app
      BUILD_MAIN_SHA: "dev"
    ports:
      - "18011:8000"
    command: ["uvicorn", "run_reset_app:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  lumenai_reset_db:
