services:
  - type: web
    name: lumen-ai-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.api
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lumen-ai-redis
          property: connectionString
      - key: ENABLE_DEV_AUTH
        value: "false"
      - key: DEV_AUTH_TOKEN
        generateValue: true
      - key: LUMENAI_JWT_SECRET
        generateValue: true
      - key: ENABLE_ENTERPRISE_AUDIT
        value: "true"
      - key: ENABLE_ENTERPRISE_RBAC
        value: "true"
      - key: PORTFOLIO_BRIEFING_SCHEDULER_SECONDS
        value: "3600"
      - key: EXECUTIVE_KPI_SCHEDULER_HOURS
        value: "24"
      - key: ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: lumen-ai-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.api
    dockerContext: ./backend
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lumen-ai-redis
          property: connectionString
      - key: LUMENAI_JWT_SECRET
        generateValue: true

  - type: redis
    name: lumen-ai-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: lumen-ai-1
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    autoDeploy: true
    # Hashed assets are immutable and cached forever; every HTML document route
    # is never cached so a redeploy's new asset hashes are picked up immediately.
    # NOTE: header rules match the REQUEST path. Every SPA route (/login,
    # /dashboard, baseline pages, …) serves index.html under its own path, so the
    # no-cache rule MUST be a catch-all (/*) — covering only / and /index.html
    # let /login cache a stale HTML that pointed at purged bundles → white page.
    # /assets/* is listed first so hashed assets stay immutable.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /dashboard
        destination: /index.html
      - type: rewrite
        source: /dashboard/*
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: lumen-ai-db
    plan: starter
    databaseName: lumenai
    user: lumen
