services:
  - type: web
    name: lumen-ai-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.api
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # ENVIRONMENT is read by several guards alongside APP_ENV; set both so a
      # single source can never silently disable a production check.
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lumen-ai-redis
          property: connectionString
      - key: ENABLE_DEV_AUTH
        value: "false"
      # Authentication mode. Production requires this to be set explicitly, or
      # the app refuses to boot. Use "oidc" and fill in the issuer/audience
      # below. (AUTH_MODE=dev in production also requires ALLOW_DEV_AUTH_IN_PROD
      # =true as a deliberate, auditable exception — not set here on purpose.)
      - key: AUTH_MODE
        value: oidc
      - key: OIDC_ISSUER_URL
        sync: false
      - key: OIDC_AUDIENCE
        sync: false
      # App-issued login tokens are signed with SECRET_KEY; generate a strong
      # one. (LUMENAI_JWT_SECRET is retained below for the enterprise JWT path.)
      - key: SECRET_KEY
        generateValue: true
      # Pin CORS to the deployed frontend origin. Override only if the frontend
      # host changes; do NOT widen this to all *.onrender.com.
      - key: CORS_ORIGIN_REGEX
        value: ^https://lumen-ai-1\.onrender\.com$
      - key: DEV_AUTH_TOKEN
        generateValue: true
      - key: LUMENAI_JWT_SECRET
        generateValue: true
      - key: ENABLE_ENTERPRISE_AUDIT
        value: "true"
      - key: ENABLE_ENTERPRISE_RBAC
        value: "true"
      - key: PORTFOLIO_BRIEFING_SCHEDULER_SECONDS
        value: "3600"
      - key: EXECUTIVE_KPI_SCHEDULER_HOURS
        value: "24"
      # Explicit allow-list for the SPA origin. Previously sync:false (set by
      # hand per deploy), which historically drifted and broke cross-origin
      # POSTs. Pinned here; keep in sync with CORS_ORIGIN_REGEX above.
      - key: ALLOWED_ORIGINS
        value: https://lumen-ai-1.onrender.com

  - type: worker
    name: lumen-ai-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.api
    dockerContext: ./backend
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: ENVIRONMENT
        value: production
      - key: AUTH_MODE
        value: oidc
      - key: ENABLE_DEV_AUTH
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lumen-ai-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: LUMENAI_JWT_SECRET
        generateValue: true

  - type: redis
    name: lumen-ai-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: lumen-ai-1
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    autoDeploy: true
    # Hashed assets are immutable and cached forever; every HTML document route
    # is never cached so a redeploy's new asset hashes are picked up immediately.
    # NOTE: header rules match the REQUEST path. Every SPA route (/login,
    # /dashboard, baseline pages, …) serves index.html under its own path, so the
    # no-cache rule MUST be a catch-all (/*) — covering only / and /index.html
    # let /login cache a stale HTML that pointed at purged bundles → white page.
    # /assets/* is listed first so hashed assets stay immutable.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /dashboard
        destination: /index.html
      - type: rewrite
        source: /dashboard/*
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Single-origin frontend (RECOMMENDED for cookie auth) ────────────────────
  # Serves the SPA AND reverse-proxies /api to the backend from ONE host, so the
  # backend can set a first-party httpOnly session cookie. Runs ALONGSIDE the
  # static `lumen-ai-1` service above during migration — verify this service,
  # then point your custom domain here and retire the static one.
  #
  # CUTOVER CHECKLIST (see PRODUCTION_HARDENING.md "Single-origin migration"):
  #   1. Deploy this service; confirm https://<this-host>/healthz and that the
  #      app loads and can log in (its /api calls are same-origin).
  #   2. Add CORS origin for this host to the API (or, once this is the only
  #      frontend, CORS is moot because all calls are same-origin).
  #   3. Switch the backend login to set an httpOnly Secure SameSite=Lax cookie
  #      and set VITE_AUTH_TRANSPORT=cookie (already baked into this image).
  #   4. Point the custom domain at this service; retire `lumen-ai-1`.
  #   5. Make `lumen-ai-api` private (remove its public URL) so the API is only
  #      reachable through this proxy.
  - type: web
    name: lumen-ai-web
    runtime: docker
    plan: starter
    dockerfilePath: ./frontend/Dockerfile.render
    dockerContext: ./frontend
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Internal URL of the API service. On Render, services reach each other by
      # name over the private network; adjust the port to the API's listen port.
      - key: API_UPSTREAM
        fromService:
          type: web
          name: lumen-ai-api
          property: hostport
        # If `hostport` isn't resolvable in your Render plan, hardcode the
        # internal URL instead, e.g. value: http://lumen-ai-api:8000

databases:
  - name: lumen-ai-db
    plan: starter
    databaseName: lumenai
    user: lumen
