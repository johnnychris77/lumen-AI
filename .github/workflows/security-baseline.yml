name: Security Baseline Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-security-and-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite:///./lumenai.db
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi uvicorn sqlalchemy pydantic pytest httpx reportlab requests python-multipart
          fi
          pip install httpx pytest ruff pip-audit bandit

      - name: Python syntax compile check
        run: |
          python -m compileall app

      - name: Ruff lint check
        run: |
          ruff check app tests

      - name: Bandit security scan
        run: |
          bandit -r app --severity-level medium || true

      - name: Python dependency vulnerability scan
        run: |
          pip-audit

  frontend-security-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install frontend dependencies
        run: |
          npm ci || npm install

      - name: Frontend build check
        run: |
          npm run build

      - name: NPM dependency audit
        run: |
          npm audit --audit-level=high

  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
