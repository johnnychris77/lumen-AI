name: Publish Public Demo Landing Page

on:
  push:
    branches:
      - main
    paths:
      - "docs/public-demo/**"
      - ".github/workflows/github-pages-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public demo artifact
        run: |
          mkdir -p public
          cp -R docs/public-demo/* public/

          cat > public/.nojekyll <<'NOJEKYLL'
          NOJEKYLL

          echo "Public demo artifact prepared"
          find public -maxdepth 3 -type f | sort

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
