name: Core CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-core-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        
    env:
      DATABASE_URL: sqlite:///./backend/lumenai.db
      PYTHONPATH: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            pip install fastapi uvicorn sqlalchemy pydantic pytest httpx reportlab requests python-multipart ruff
          fi
          pip install ruff

      - name: Compile backend
        run: |
          python -m compileall app

      - name: Ruff backend baseline
        run: |
          ruff check backend/app backend/tests

      - name: Run backend compliance tests
        run: |
          python -m pytest \
            tests/test_enterprise_compliance_routes.py \
            tests/test_vendor_baseline_persistent_workflow.py \
            tests/test_governance_packet_hash_workflow.py \
            -q
