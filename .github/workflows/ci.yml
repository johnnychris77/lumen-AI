name: Core CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-core-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      DATABASE_URL: sqlite:///./backend/lumenai.db
      PYTHONPATH: backend
      AUTH_MODE: dev
      DEV_AUTH_TOKEN: dev-token
      ENABLE_DEV_AUTH: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          python -m pip install pytest httpx ruff
          pip install pytest httpx ruff
          pip install httpx pytest ruff
          else
            pip install pytest httpx ruff fastapi uvicorn sqlalchemy pydantic pytest httpx reportlab requests python-multipart ruff
          fi
          pip install ruff

      - name: Compile backend
        run: |
          python -m compileall backend/app

      - name: Ruff backend baseline
        run: |
          ruff check backend/app backend/tests

      - name: Run backend compliance tests
        run: |
